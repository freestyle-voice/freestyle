name: Submit Android

# Manual trigger only. This is a monorepo — an `on: push` trigger would build and
# submit the mobile app on every unrelated merge to main. Run with:
#   eas workflow:run submit-android.yml
on:
  workflow_dispatch:

jobs:
  build_android:
    name: Build Android app
    type: build
    params:
      platform: android
      profile: production

  submit_android:
    name: Submit to Google Play Store
    needs: [build_android]
    type: submit
    params:
      profile: production
      build_id: ${{ needs.build_android.outputs.build_id }}
