<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Freestyle — Download</title>
<meta name="description" content="Download Freestyle for macOS, Windows and Linux. Open-source voice dictation that runs on your laptop." />

<link rel="icon" type="image/svg+xml" href="logo/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #F4F0E4; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    color: #16140F;
    -webkit-font-smoothing: antialiased;
    scroll-behavior: smooth;
  }
  .serif        { font-family: 'Instrument Serif', 'Times New Roman', serif; }
  .serif-italic { font-family: 'Instrument Serif', 'Times New Roman', serif; font-style: italic; }
  .mono         { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .fs-navlink { border-bottom: 1px solid transparent; padding-bottom: 2px; transition: color .15s ease, border-color .15s ease; }
  .fs-navlink:hover { color: #16140F !important; border-bottom-color: var(--accent, #6B8F12); }

  #top { --accent: #6B8F12; }

  .fs-btn { transition: background .15s ease, border-color .15s ease, color .15s ease; font-family: inherit; }
  .fs-btn svg { transition: transform .15s ease; }
  .fs-btn-primary { background: #16140F; color: #F4F0E4; border: 1px solid transparent; }
  .fs-btn-primary:hover { background: var(--accent, #6B8F12); }
  .fs-btn-primary:hover svg path[d^="M3 8"] { transform: translateY(3px); }
  .fs-btn-ghost { background: transparent; color: #16140F; border: 1px solid #D6CDB8; }
  .fs-btn-ghost:hover { border-color: #16140F; }
  .fs-btn-ghost:hover svg path[d^="M3 8"] { transform: translateY(3px); }

  /* package rows */
  .fs-pkg-row { transition: background .15s ease, border-color .15s ease; }
  .fs-pkg-row:hover { background: var(--accent-soft, #E8EFC9) !important; }
  .fs-pkg-row:hover .fs-pkg-arrow { transform: translateY(2px); }
  .fs-pkg-arrow { transition: transform .15s ease; }

  /* copy command */
  .fs-cmd { transition: border-color .15s ease; }
  .fs-cmd:hover { border-color: var(--accent, #6B8F12) !important; }
  .fs-copybtn { transition: color .15s ease, background .15s ease; cursor: pointer; }

  @media (max-width: 820px) {
    .fs-platform-grid { grid-template-columns: 1fr !important; gap: 18px !important; }
    .fs-reco-grid { grid-template-columns: 1fr !important; }
    .fs-cmd-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 560px) {
    .fs-navlinks { display: none !important; }
    .fs-pkg-row { grid-template-columns: 1fr auto !important; row-gap: 6px !important; }
    .fs-pkg-meta { grid-column: 1 / -1 !important; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="fs-demo.jsx"></script>
<script type="text/babel" src="fs-sections.jsx"></script>
<script type="text/babel" src="fs-download.jsx"></script>

</body>
</html>
